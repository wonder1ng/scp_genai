<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tailwind Card View</title>
  </head>
  <body class="bg-gray-100 p-10">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div
        class="bg-blue-500/70 hover:bg-purple-500 border-2 hover:border-8 border-blue-700 hover:border-purple-700 rounded-xl shadow-xl overflow-hidden opacity-70 hover:opacity-100 backdrop-blur-sm hover:backdrop-blur-none transition-all duration-300"
      >
        <img
          src="https://picsum.photos/400/250?random=1"
          class="w-full h-48 object-cover"
          alt="랜덤 이미지"
        />
        <div class="p-5 text-white">
          <h2 class="text-2xl font-bold mb-2">카드 제목 1</h2>
          <p>기본 상태는 살짝 흐릿합니다.</p>
        </div>
      </div>

      <div
        class="bg-blue-500/70 hover:bg-purple-500 border-2 hover:border-8 border-blue-700 hover:border-purple-700 rounded-xl shadow-xl overflow-hidden opacity-70 hover:opacity-100 backdrop-blur-sm hover:backdrop-blur-none transition-all duration-300"
      >
        <img
          src="https://picsum.photos/400/250?random=2"
          class="w-full h-48 object-cover"
          alt="랜덤 이미지"
        />
        <div class="p-5 text-white">
          <h2 class="text-2xl font-bold mb-2">카드 제목 2</h2>
          <p>마우스를 올리면 선명해집니다.</p>
        </div>
      </div>

      <div
        class="bg-blue-500/70 hover:bg-purple-500 border-2 hover:border-8 border-blue-700 hover:border-purple-700 rounded-xl shadow-xl overflow-hidden opacity-70 hover:opacity-100 backdrop-blur-sm hover:backdrop-blur-none transition-all duration-300"
      >
        <img
          src="https://picsum.photos/400/250?random=3"
          class="w-full h-48 object-cover"
          alt="랜덤 이미지"
        />
        <div class="p-5 text-white">
          <h2 class="text-2xl font-bold mb-2">카드 제목 3</h2>
          <p>hover 시 강조 효과가 적용됩니다.</p>
        </div>
      </div>
    </div>
  </body>
</html>
