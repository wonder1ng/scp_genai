<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tailwind Card View</title>
  </head>
  <body class="bg-gray-100 p-10">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div
        class="bg-blue-500 hober:bg-purple-500 border-2 hover:border-8 broder-blue-700 hover:border-purple-700 rounded-xl shadow-xl overflow-hidden transition-all duration-300"
      >
        <img
          src="https://picsum.photos/400/250?random=1"
          class="w-full h-48 object-cover"
          alt="랜덤 이미지"
        />
        <div class="p-5 text-white">
          <h2 class="text-2xl font-bold mb-2">카드 제목 1</h2>
          <p>TailwindCSS로 만든 첫 번째 카드입니다</p>
        </div>
      </div>

      <div
        class="bg-blue-500 hover:bg-purple-500 border-2 hover:border-8 border-blue-700 hover:border-purple-700 rounded-xl shadow-xl overflow-hidden transition-all duration-300"
      >
        <img
          src="https://picsum.photos/400/250?random=2"
          class="w-full h-48 object-cover"
          alt="랜덤 이미지"
        />
        <div class="p-5 text-white">
          <h2 class="text-2xl font-bold mb-2">카드 제목 2</h2>
          <p>마우스를 올리면 보라색으로 변경됩니다.</p>
        </div>
      </div>

      <div
        class="bg-blue-500 hover:bg-purple-500 border-2 hover:border-8 border-blue-700 hover:border-purple-700 rounded-xl shadow-xl overflow-hidden transition-all duration-300"
      >
        <img
          src="https://picsum.photos/400/250?random=3"
          class="w-full h-48 object-cover"
          alt="랜덤 이미지"
        />
        <div class="p-5 text-white">
          <h2 class="text-2xl font-bold mb-2">카드 제목 3</h2>
          <p>그림자와 테두리 효과가 적용되어 있습니다.</p>
        </div>
      </div>
    </div>
  </body>
</html>
