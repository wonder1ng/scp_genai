<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>타이틀</title>
  </head>
  <body>
    <h1>입력 폼에 넣을 수 있는 다양한 값</h1>
    <input type="radio" name="과목" value="국어" />국어
    <input type="radio" name="과목" value="영어" />영어
    <input type="radio" name="과목" value="수학" />수학
    <hr />
    <input type="radio" name="음료" value="option1" />아메리카노
    <input type="radio" name="음료" value="option2" />라떼
    <input type="radio" name="음료" value="option3" />카푸치노
    <hr />
    <input type="radio" name="음식" />김밥
    <input type="radio" name="음식" />떡볶이
    <input type="radio" name="음식" />라면
    <h2>여러 개 중 다중 선택</h2>
    <input type="checkbox" name="음식" />김밥
    <input type="checkbox" name="음식" />떡볶이
    <input type="checkbox" name="음식" />라면
    <hr />
    <input type="checkbox" name="음료" value="option1" />아메리카노
    <input type="checkbox" name="음료" value="option2" />라떼
    <input type="checkbox" name="음료" value="option3" />카푸치노
    <h2>풀다운 메뉴</h2>
    <select>
      <option>사이다</option>
      <option>콜라</option>
      <option>환타</option>
      <option>우유</option>
    </select>
    <select size="5" multiple>
      <option>사이다</option>
      <option>콜라</option>
      <option>환타</option>
      <option>우유</option>
      <option>초코우유</option>
      <option>딸기우유</option>
    </select>
    <h3>프로그래스바</h3>
    <progress value="40" max="100">40%</progress>
    <progress value="60" max="100">60%</progress>
    <progress value="80" max="100"></progress>
  </body>
</html>
