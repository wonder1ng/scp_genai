<html>
  <head>
    <title>포토 캘린더</title>
    <style>
      h1,
      h2 {
        text-align: center;
      }

      #calendar {
        width: 100%;
        border-collapse: collapse;
      }

      #calendar th {
        /* #calendar th : calendar 밑에 있는 모든 th */
        /* #calendar > th : calendar 바로 밑에 있는 th */
        width: 14%;
        padding: 10px;
        background-color: #dadada;
      }

      #calendar td {
        text-align: center;
        padding: 10px;
        border: 1px solid black;
      }

      /* #calendar th:first-child, #calendar td:first-child { */
      /* 모든 calendar id의 first-child를 골라라 */
      #calendar tr > *:first-child {
        color: red;
      }

      #calendar th:last-child,
      #calendar td:last-child {
        color: blue;
      }

      img {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <h1>포토 캘린더</h1>
    <h2>2026년 4월</h2>
    <img src="../001_HTML/images/img01.jpg" width="50%" alt="고양이" />
    <table id="calendar">
      <tr>
        <th>Sun</th>
        <th>Mon</th>
        <th>Tue</th>
        <th>Wed</th>
        <th>Thu</th>
        <th>Fri</th>
        <th>Sat</th>
      </tr>
      <tr>
        <td></td>
        <td></td>
        <td></td>
        <td>1</td>
        <td>2</td>
        <td>3</td>
        <td>4</td>
      </tr>
      <tr>
        <td>5</td>
        <td>6</td>
        <td>7</td>
        <td>8</td>
        <td>9</td>
        <td>10</td>
        <td>11</td>
      </tr>
      <tr>
        <td>12</td>
        <td>13</td>
        <td>14</td>
        <td>15</td>
        <td>16</td>
        <td>17</td>
        <td>18</td>
      </tr>
      <tr>
        <td>19</td>
        <td>20</td>
        <td>21</td>
        <td>22</td>
        <td>23</td>
        <td>24</td>
        <td>25</td>
      </tr>
      <tr>
        <td>26</td>
        <td>27</td>
        <td>28</td>
        <td>29</td>
        <td>30</td>
        <td></td>
        <td></td>
      </tr>
    </table>
  </body>
</html>
