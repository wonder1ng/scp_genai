<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.css"> -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
    <title>Document</title>
  </head>
  <body>
    <i class="fa-regular fa-user"></i>
    <i class="fa-regular fa-heart"></i>
    <i class="fa-regular fa-smile"></i>
    <i class="fa-regular fa-coffee"></i>
    <hr />
    <i class="fa-solid fa-user"></i>
    <i class="fa-solid fa-heart"></i>
    <i class="fa-solid fa-smile"></i>
    <hr />
    <i class="fa-regular fa-user fa-2x"></i>
    <i class="fa-regular fa-heart fa-2x"></i>
    <i class="fa-regular fa-smile fa-2x"></i>
    <hr />
    <i class="fa-regular fa-user fa-2x fa-shake"></i>
    <i class="fa-regular fa-heart fa-2x fa-spin"></i>
    <i class="fa-regular fa-smile fa-2x fa-bounce"></i>
    <hr />
    <i class="fa-regular fa-user fa-2x fa-shake" style="color: green"></i>
    <i class="fa-regular fa-heart fa-2x fa-spin" style="color: red"></i>
    <i class="fa-regular fa-smile fa-2x fa-bounce" style="color: yellow"></i>
    <hr />
    <!-- material -->
    <span class="material-symbols-outlined">home</span>
    <span class="material-symbols-outlined">star</span>
    <span class="material-symbols-outlined">login</span>
    <span class="material-symbols-outlined">settings</span>
  </body>
</html>
