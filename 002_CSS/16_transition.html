<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .square {
        width: 100px;
        height: 100px;
        background-color: red;
        transition-property:
          width, height; /* 해당 속성이 변할 때 애니메이션 적용 */
        transition-duration: 1.5s;
        transition-timing-function: cubic-bezier(0.175, 0.885, 032, 1.275);
      }

      .square:hover {
        width: 200px;
        height: 200px;
      }

      .button {
        color: black;
        transition-property: color;
        transition-duration: 1.5s;
      }

      .button:hover {
        color: red;
      }

      .image {
        width: 300px;
        height: 200px;
        transition-property: transform;
        transition-duration: 1s;
      }

      .image:hover {
        transform: rotate(180deg);
      }
    </style>
  </head>
  <body>
    <div class="square"></div>
    <br />
    <button class="button">마우스를 올려보시오</button>
    <br />
    <img src="../001_HTML/images/img01.jpg" class="image" />
  </body>
</html>
