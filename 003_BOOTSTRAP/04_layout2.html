<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <title>Document</title>
  </head>
  <body class="mb-5">
    <section class="mb-5">
      <h4>1. d-* 클래스</h4>
      <div class="d-block">d-block (블럭 요소)</div>
      <div class="d-block border m-2">d-block (블럭 요소)</div>
      <div class="d-block border bg-light p-2">d-block (블럭 요소)</div>
      <div class="d-block border bg-dark text-white p-2 m-2">
        d-block (블럭 요소)
      </div>
      <div class="d-inline">d-inline (인라인 요소)</div>
      <div class="d-inline">d-inline (인라인 요소)</div>
    </section>
    <section class="mb-5">
      <h4>2. Visible 클래스</h4>
      <div class="bg-success text-white p-2">보이는 요소</div>
      <div class="bg-success text-white p-2 invisible">안 보이는 요소</div>
    </section>
    <section class="mb-5">
      <h4>3. Display 반응형 조정</h4>
      <div class="d-none">이건 안 보임</div>
      <div class="d-sm-block d-none">
        이건 해상도가 클 때만 보이고, 576(sm)보다 작으면 안 보임
      </div>
    </section>

    <section class="mb-5">
      <h4>4. Flex Layout</h4>
      <div class="d-flex mb-2">
        <div class="bg-primary text-white p-2">플렉스</div>
        <div class="bg-secondary text-white p-2">플렉스</div>
        <div class="bg-info text-white p-2">플렉스</div>
      </div>
    </section>
  </body>
</html>
