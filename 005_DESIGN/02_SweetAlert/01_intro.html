<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SweetAlert2</title>
    <!-- alert 모달창 js 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body>
    <h1>간단한 Alert 테스트</h1>
    <button onclick="showAlert()">버튼</button>
    <button onclick="confirmAlert()">삭제 버튼</button>
    <script>
      function showAlert() {
        console.log("버튼 클릭됨");
        alert("이건 경고창입니다.");
        Swal.fire({
          title: "안녕하세요!",
          text: "이건 SweetAlert의 경고창입니다.",
          icon: "success", // success, error, warning, info, question
          confirmButtonText: "확인",
        });
      }
      function confirmAlert() {
        Swal.fire({
          title: "정말 삭제하시겠습니까?",
          text: "이 작업은 되돌릴 수 없습니다.",
          icon: "question",
          showCancelButton: true,
          confirmButtonText: "삭제",
          cancelButtonText: "취소",
        }).then((result) => {
          console.log(result);
          if (result.isConfirmed) {
            Swal.fire("삭제 완료", "항목이 삭제되었습니다", "success");
          } else {
            Swal.fire("취소됨", "데이터는 그대로 유지합니다", "cancel");
          }
        });
      }

      function inputPrompt() {
        Swal.fire({
          title: "이름을입력하세요",
          input: "text",
          inputPlaceHolder: "여기에 입력...",
          showCancelButton: true,
          confirmButtonText: "제출",
          cancelButtonText: "취소",
        }).then((result) => {
          if (result.isConfirmed && result.value) {
            Swal.fire("입력한 값: ${result.value}");
          }
        });
      }
    </script>
  </body>
</html>
