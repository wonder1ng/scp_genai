<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>교실 자리 배치 시스템</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  text-align: center;
}

.wrapper {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 10px;
}

/* 학생 목록 */
#studentList {
  width: 240px;
  background: white;
  padding: 10px;
  border: 1px solid #ccc;
  text-align: left;
  height: 600px;
  overflow-y: auto;
}

.student {
  padding: 5px;
  margin: 3px;
  background: #e3f2fd;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
}

.student.missing {
  background: #ffcdd2;
}

.student.selected {
  outline: 3px solid red;
}

/* 교실 */
.classroom {
  width: 900px;
  background: white;
  border: 2px solid #333;
  padding: 10px;
  box-sizing: border-box;
}

/* 뒤쪽 유리창 */
.top {
  background: #cfd8dc;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 10px;
  font-weight: bold;
}

/* 좌석 */
.grid {
  display: grid;
  grid-template-columns: repeat(12, 70px);
  grid-template-rows: repeat(7, 50px);
  gap: 5px;
  justify-content: center;
}

.seat {
  background: #f4e7c5;
  border: 1px solid #999;
  display: flex;
  flex-direction: column;
  justify-content: center;
  font-size: 12px;
  cursor: pointer;
}

.seat.empty {
  background: #ffcdd2;
}

.seat.selected {
  outline: 3px solid blue;
}

.number {
  font-size: 11px;
  font-weight: bold;
}

.name {
  font-size: 12px;
}

/* 하단 */
.bottom {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

.box {
  width: 45%;
  background: #cfd8dc;
  padding: 10px;
  font-weight: bold;
}

.controls {
  margin: 10px;
}
</style>
</head>

<body>

<h2>교실 자리 배치 시스템</h2>

<div class="controls">
  <input id="nameInput" placeholder="학생 이름">
  <button onclick="addStudent()">추가</button>
  <button onclick="shuffleSeats()">랜덤 배치</button>
</div>

<div class="wrapper">

<div id="studentList"></div>

<div class="classroom">

  <div class="top">뒤쪽 유리창</div>

  <div class="grid" id="grid"></div>

  <div class="bottom">
    <div class="box">강사</div>
    <div class="box">앞쪽 스크린</div>
  </div>

</div>

</div>

<script>

/* =========================
   학생 데이터
========================= */

let students = [
"이민지","채란","이태경","심정호","박준하","박초롱",
"김유선","이종혁","김민정","유지산","한은태","김선희",
"조용민","박상우","진미경","한혜경","신혜진","원가희",
"박은빈","박지우","김민정","김성호","권태현","이상욱",
"황동건","이서우","최준호","이춘우","조은결","조윤"
];

/* seats */
let seats = [...Array(30).keys()];

/* 선택 상태 */
let selectedStudent = null;
let selectedSeat = null;

/* =========================
   좌석 위치
========================= */

const seatPositions = [
[5,11],[5,10],[5,8],[5,7],
[4,11],[4,10],[4,8],[4,7],[4,6],[4,3],
[3,11],[3,10],[3,8],[3,7],[3,6],[3,3],
[2,11],[2,10],[2,8],[2,7],[2,6],[2,3],[2,2],
[1,11],[1,10],[1,8],[1,7],[1,6],[1,3],[1,2]
];

/* =========================
   자동 채우기
========================= */
function autoFillSeats() {
  seats = Array(30).fill(null);

  for (let i = 0; i < Math.min(students.length, 30); i++) {
    seats[i] = i;
  }
}

/* =========================
   추가
========================= */
function addStudent() {
  const input = document.getElementById("nameInput");
  if (!input.value.trim()) return;

  students.push(input.value.trim());
  input.value = "";

  autoFillSeats();
  renderAll();
}

/* =========================
   삭제
========================= */
function removeStudent(index) {
  students.splice(index, 1);
  autoFillSeats();
  renderAll();
}

/* =========================
   랜덤 배치
========================= */
function shuffleSeats() {

  const list = [...students.map((_, i) => i)];

  for (let i = list.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [list[i], list[j]] = [list[j], list[i]];
  }

  seats = Array(30).fill(null);

  for (let i = 0; i < Math.min(list.length, 30); i++) {
    seats[i] = list[i];
  }

  renderAll();
}

/* =========================
   수동 배치 + 자리 swap
========================= */
function handleSeatClick(seatIndex) {

  // 1. 학생 → 자리 이동
  if (selectedStudent !== null) {

    const old = seats.indexOf(selectedStudent);
    if (old !== -1) seats[old] = null;

    seats[seatIndex] = selectedStudent;

    selectedStudent = null;
    renderAll();
    return;
  }

  // 2. 자리 ↔ 자리 swap
  if (selectedSeat === null) {
    selectedSeat = seatIndex;
  } else {

    [seats[selectedSeat], seats[seatIndex]] =
    [seats[seatIndex], seats[selectedSeat]];

    selectedSeat = null;
  }

  renderAll();
}

/* =========================
   학생 목록
========================= */
function renderStudents() {
  const box = document.getElementById("studentList");

  box.innerHTML = `<b>학생 목록 (${students.length}명)</b><hr>`;

  students.forEach((s, i) => {

    const isSeated = seats.includes(i);

    const div = document.createElement("div");
    div.className = "student";

    if (!isSeated) div.classList.add("missing");
    if (selectedStudent === i) div.classList.add("selected");

    div.innerHTML = `
      ${i + 1}. ${s}
      <button onclick="removeStudent(${i})">X</button>
    `;

    div.onclick = () => {
      selectedStudent = i;
      renderAll();
    };

    box.appendChild(div);
  });
}

/* =========================
   좌석 렌더
========================= */
function renderSeats() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for (let i = 0; i < 30; i++) {

    const div = document.createElement("div");
    div.className = "seat";

    const studentIndex = seats[i];
    const isEmpty = studentIndex === null;

    if (isEmpty) div.classList.add("empty");

    if (selectedSeat === i) div.classList.add("selected");

    div.innerHTML = `
      <div class="number">${i + 1}번</div>
      <div class="name">${isEmpty ? "비어있음" : students[studentIndex]}</div>
    `;

    div.onclick = () => handleSeatClick(i);

    const pos = seatPositions[i];
    div.style.gridRow = pos[0];
    div.style.gridColumn = pos[1];

    grid.appendChild(div);
  }
}

/* =========================
   전체 렌더
========================= */
function renderAll() {
  renderStudents();
  renderSeats();
}

/* 초기 실행 */
autoFillSeats();
renderAll();

</script>

</body>
</html>
